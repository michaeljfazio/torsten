name: Fuzz Testing

on:
  pull_request:
  schedule:
    # Nightly at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - decode_block
          - decode_transaction
          - nonce_update
          - handshake
          - chainsync_msg
          - protocol_params
          - address
          - governance
          - ledger_snapshot
          - tx_validation
          - block_apply
          - encode_roundtrip
          - lsm_operations
          - mempool_admission
          - epoch_transition
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-${{ matrix.target }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzzer (PR — 5 minutes)
        if: github.event_name == 'pull_request'
        run: cargo +nightly fuzz run fuzz_${{ matrix.target }} -- -max_total_time=300

      - name: Run fuzzer (nightly — 1 hour)
        if: github.event_name == 'schedule'
        run: cargo +nightly fuzz run fuzz_${{ matrix.target }} -- -max_total_time=3600

      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: corpus-${{ matrix.target }}
          path: fuzz/corpus/fuzz_${{ matrix.target }}/
          if-no-files-found: ignore

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: crashes-${{ matrix.target }}
          path: fuzz/artifacts/fuzz_${{ matrix.target }}/
          if-no-files-found: ignore
