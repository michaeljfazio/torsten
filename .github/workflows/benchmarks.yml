name: Nightly Benchmarks

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bench-

      # Separate stable cache for Criterion baselines so that benchmark
      # comparison reports ("change: +2.3%") persist across CI runs even
      # when Cargo.lock changes.
      - name: Cache Criterion baselines
        uses: actions/cache@v5
        with:
          path: target/criterion
          key: ${{ runner.os }}-criterion-baselines
          restore-keys: |
            ${{ runner.os }}-criterion-baselines

      - name: Run storage benchmarks
        run: |
          # Run in default mode first (generates HTML reports with comparison)
          cargo bench -p dugite-storage --bench storage_bench 2>&1 | tee storage_bench.txt || true
          # Save baselines for next run
          cargo bench -p dugite-storage --bench storage_bench -- --save-baseline nightly 2>/dev/null || true

      - name: Run UTxO benchmarks
        run: |
          cargo bench -p dugite-ledger --bench utxo_bench 2>&1 | tee utxo_bench.txt || true
          cargo bench -p dugite-ledger --bench utxo_bench -- --save-baseline nightly 2>/dev/null || true

      - name: Run LSM large-scale stress tests
        run: |
          cargo test -p dugite-lsm --features large-tests --release -- mainnet_scale 2>&1 | tee lsm_stress.txt || true

      - name: Generate benchmark report
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p benches
          REPORT="benches/${DATE}-nightly.md"
          echo "# Nightly Benchmark Results — ${DATE}" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Machine: GitHub Actions ubuntu-latest" >> "$REPORT"
          echo "Branch: main ($(git rev-parse --short HEAD))" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "## Storage Benchmarks" >> "$REPORT"
          echo '```' >> "$REPORT"
          cat storage_bench.txt >> "$REPORT" 2>/dev/null || echo "No results" >> "$REPORT"
          echo '```' >> "$REPORT"
          echo "" >> "$REPORT"
          echo "## UTxO Benchmarks" >> "$REPORT"
          echo '```' >> "$REPORT"
          cat utxo_bench.txt >> "$REPORT" 2>/dev/null || echo "No results" >> "$REPORT"
          echo '```' >> "$REPORT"
          echo "" >> "$REPORT"
          echo "## LSM Stress Tests" >> "$REPORT"
          echo '```' >> "$REPORT"
          cat lsm_stress.txt >> "$REPORT" 2>/dev/null || echo "No results" >> "$REPORT"
          echo '```' >> "$REPORT"

      - name: Upload benchmark results as artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benches/*-nightly.md
          retention-days: 90

      - name: Copy results to docs and commit
        run: |
          DATE=$(date -u +%Y-%m-%d)
          LATEST="benches/${DATE}-nightly.md"
          if [ -f "$LATEST" ]; then
            cp "$LATEST" docs/src/reference/benchmarks.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "benches/${DATE}-nightly.md" docs/src/reference/benchmarks.md
            git commit -m "Update nightly benchmark results (${DATE})" || echo "No changes to commit"
            git pull --rebase origin main || true
            git push || echo "Push failed — results saved as artifact"
          fi

      - name: Store Criterion HTML reports
        uses: actions/upload-artifact@v7
        with:
          name: criterion-reports-${{ github.run_number }}
          path: target/criterion/
          retention-days: 30

      - name: Publish Criterion HTML to GitHub Pages
        run: |
          if [ -d "target/criterion" ]; then
            # Build mdBook docs first
            mkdir -p mdbook && curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C mdbook
            export PATH="$(pwd)/mdbook:$PATH"
            mdbook build docs || true
            # Copy Criterion HTML reports into the docs output
            mkdir -p docs/book/benchmarks
            cp -r target/criterion/* docs/book/benchmarks/ 2>/dev/null || true
            # Add a redirect page
            cat > docs/book/benchmarks/index.html <<BENCHHTML
          <!DOCTYPE html>
          <html><head><title>Dugite Benchmarks</title></head>
          <body>
          <h1>Dugite Criterion Benchmark Reports</h1>
          <p>Interactive benchmark reports from the nightly CI run.</p>
          <ul>
          BENCHHTML
            for dir in docs/book/benchmarks/*/; do
              name=$(basename "$dir")
              if [ -f "$dir/report/index.html" ]; then
                echo "<li><a href=\"$name/report/index.html\">$name</a></li>" >> docs/book/benchmarks/index.html
              fi
            done
            echo "</ul></body></html>" >> docs/book/benchmarks/index.html
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book
          destination_dir: .
          keep_files: false
