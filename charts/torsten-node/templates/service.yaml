apiVersion: v1
kind: Service
metadata:
  name: {{ include "dugite-node.fullname" . }}
  labels:
    {{- include "dugite-node.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: n2n
      port: {{ .Values.network.port }}
      targetPort: n2n
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
  selector:
    {{- include "dugite-node.selectorLabels" . | nindent 4 }}
