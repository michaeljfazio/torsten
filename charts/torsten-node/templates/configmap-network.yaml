{{/*
  Network-specific node configuration.
  Genesis files are bundled in the container image at /opt/torsten/config/.
  The config file references genesis files using absolute paths to the image's config dir.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "torsten-node.fullname" . }}-network
  labels:
    {{- include "torsten-node.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "Network": {{ if eq .Values.network.name "mainnet" }}"Mainnet"{{ else }}"Testnet"{{ end }},
      "NetworkMagic": {{ include "torsten-node.networkMagic" . }},
      "RequiresNetworkMagic": {{ if eq .Values.network.name "mainnet" }}"RequiresNoMagic"{{ else }}"RequiresMagic"{{ end }},
      "EnableP2P": true,
      "PeerSharing": {{ .Values.network.peerSharing | default "PeerSharingPublic" | quote }},
      "TargetNumberOfRootPeers": {{ .Values.network.targetRootPeers | default 60 }},
      "TargetNumberOfActivePeers": {{ .Values.network.targetActivePeers | default 20 }},
      "TargetNumberOfEstablishedPeers": {{ .Values.network.targetEstablishedPeers | default 40 }},
      "TargetNumberOfKnownPeers": {{ .Values.network.targetKnownPeers | default 100 }},
      "TargetNumberOfActiveBigLedgerPeers": {{ .Values.network.targetActiveBigLedgerPeers | default 5 }},
      "TargetNumberOfEstablishedBigLedgerPeers": {{ .Values.network.targetEstablishedBigLedgerPeers | default 10 }},
      "TargetNumberOfKnownBigLedgerPeers": {{ .Values.network.targetKnownBigLedgerPeers | default 15 }},
      "Protocol": "Cardano",
      "ByronGenesisFile": "/opt/torsten/config/{{ .Values.network.name }}-byron-genesis.json",
      "ShelleyGenesisFile": "/opt/torsten/config/{{ .Values.network.name }}-shelley-genesis.json",
      "AlonzoGenesisFile": "/opt/torsten/config/{{ .Values.network.name }}-alonzo-genesis.json",
      "ConwayGenesisFile": "/opt/torsten/config/{{ .Values.network.name }}-conway-genesis.json",
      "MinSeverity": {{ .Values.logging.minSeverity | default "Info" | quote }},
      {{- if .Values.peerGovernor }}
      "ChurnIntervalNormalSecs": {{ .Values.peerGovernor.churnIntervalNormalSecs | default 3300 }},
      "ChurnIntervalSyncSecs": {{ .Values.peerGovernor.churnIntervalSyncSecs | default 900 }},
      "StallDemotionCycles": {{ .Values.peerGovernor.stallDemotionCycles | default 6 }},
      "ErrorDemotionThreshold": {{ .Values.peerGovernor.errorDemotionThreshold | default 5 }},
      {{- end }}
      "MaxConcurrencyBulkSync": {{ .Values.ledger.maxConcurrencyBulkSync | default 2 }},
      "MaxConcurrencyDeadline": {{ .Values.ledger.maxConcurrencyDeadline | default 4 }},
      "SnapshotInterval": {{ .Values.ledger.snapshotInterval | default 72 }}
    }
