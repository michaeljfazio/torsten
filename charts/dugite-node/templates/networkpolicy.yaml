{{- if eq .Values.role "producer" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dugite-node.fullname" . }}
  labels:
    {{- include "dugite-node.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dugite-node.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow N2N connections only from pods with relay role
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: relay
      ports:
        - port: {{ .Values.network.port }}
          protocol: TCP
    # Allow metrics scraping from anywhere in the cluster
    {{- if .Values.metrics.enabled }}
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
    {{- end }}
{{- end }}
